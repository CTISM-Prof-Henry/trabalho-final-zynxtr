<!DOCTYPE html>
<html lang="pt-BR">

<head>


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Museu Virtual</title>


    <link rel="stylesheet" href="../css/style.css">

</head>

<body>


<main class="container">

    <section class="card">

        <h1>Museu Virtual</h1>

        <p>Guarde suas melhores memórias.</p>


        <form>

            <label>Email</label>

            <input
                    type="email"
                    placeholder="Digite seu email"
                    maxlength="60">

            <label>Senha</label>

            <input
                    type="password"
                    placeholder="Digite sua senha"
                    maxlength="20">

        </form>


        <a href="salas.html">

            <button class="btn">

                Entrar

            </button>

        </a>

        <button class="btn-secundario">

            Criar Conta

        </button>

    </section>

</main>

</body>

</html>
